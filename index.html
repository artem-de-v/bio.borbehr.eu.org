<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000" id="meta-theme">
    <meta property="og:title" content="" id="meta-og-title" />
    <meta property="og:description" content="" id="meta-og-desc" />
    <title id="site-title">Loading...</title>

    <script type="module">
        import { rainbowCursor } from "https://unpkg.com/cursor-effects@latest/dist/esm.js";
        new rainbowCursor();
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.3s ease-in-out;
        }

        #enter-text {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: lowercase;
            animation: fadeInPulse 3s infinite;
            opacity: 0;
        }

        #main-content {
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hub-title {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .links-dir {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .links-dir a {
            font-size: 18px;
            color: #888;
            letter-spacing: 1px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 5px 20px;
        }

        .links-dir a:hover {
            color: #ffffff;
            text-shadow: 0px 0px 15px rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
        }

        @keyframes fadeInPulse {
            0% { opacity: 0; }
            50% { opacity: 1; text-shadow: 0 0 10px #ffffff; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop></audio>

    <div id="overlay">
        <div id="enter-text">click to enter</div>
    </div>

    <div id="main-content">
        <div class="hub-title">Select Bio-Link</div>
        <div class="links-dir" id="links-container"></div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
